<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAC-MAN Workshop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }

  /* ── Responsive wrapper: scales 1920×1080 to fit any browser window ── */
  #game-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1920px;
    height: 1080px;
    transform-origin: center center;
    transform: translate(-50%, -50%);
  }

  canvas {
    display: block;
    width: 1920px;
    height: 1080px;
  }

  /* ============================================================
     OVERLAY SCREENS (Menu, Game Over, You Win)
     ============================================================ */
  .overlay-screen {
    position: absolute;
    top: 0; left: 0;
    width: 1920px; height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    background-size: cover;
    background-position: center;
    transition: opacity 0.4s;
  }

  .overlay-screen.hidden { display: none; }

  /* ---------- MENU SCREEN ---------- */
  #menu-screen {
    background-color: #111;
  }
  #menu-screen .menu-title {
    font-size: 72px;
    color: #FFD700;
    text-shadow: 4px 4px 0 #FF6600, 0 0 40px rgba(255,215,0,0.4);
    margin-bottom: 20px;
    letter-spacing: 6px;
  }
  #menu-screen .menu-subtitle {
    font-size: 18px;
    color: #aaa;
    margin-bottom: 60px;
    letter-spacing: 2px;
  }

  /* SWAPPABLE: Insert Coin Button */
  .insert-coin-btn {
    position: relative;
    cursor: pointer;
    border: none;
    background: transparent;
    padding: 0;
    transform-origin: center center;
    transition: transform 0.15s, filter 0.15s;
  }
  .insert-coin-btn:hover {
    transform: scale(1.1);
    filter: brightness(1.3);
  }
  .insert-coin-btn .btn-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 400px;
    height: 100px;
    background: linear-gradient(180deg, #FFD700, #FF8C00);
    border: 4px solid #FFF;
    border-radius: 12px;
    font-family: 'Press Start 2P', monospace;
    font-size: 22px;
    color: #000;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
    animation: pulse-coin 1.5s ease-in-out infinite;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .insert-coin-btn:hover .btn-placeholder {
    background: linear-gradient(180deg, #FFE44D, #FFA020);
    box-shadow: 0 0 25px rgba(255,215,0,0.6);
  }
  .insert-coin-btn .btn-custom-img {
    display: none;
    width: 400px;
    height: auto;
    transition: filter 0.15s;
  }
  .insert-coin-btn:hover .btn-custom-img {
    filter: brightness(1.25) drop-shadow(0 0 12px rgba(255,255,255,0.4));
  }

  @keyframes pulse-coin {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.06); filter: brightness(1.2); }
  }

  /* ---------- GAME OVER SCREEN ---------- */
  #gameover-screen {
    background-color: rgba(20, 0, 0, 0.92);
  }
  #gameover-screen .go-title {
    font-size: 64px;
    color: #FF0000;
    text-shadow: 0 0 30px rgba(255,0,0,0.6);
    margin-bottom: 20px;
  }
  #gameover-screen .go-score {
    font-size: 24px;
    color: #FFD700;
    margin-bottom: 50px;
  }
  #gameover-screen .go-custom-bg {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: -1;
  }

  /* ---------- WIN SCREEN ---------- */
  #win-screen {
    background-color: rgba(0, 20, 5, 0.92);
  }
  #win-screen .win-title {
    font-size: 58px;
    color: #00FF88;
    text-shadow: 0 0 30px rgba(0,255,136,0.5);
    margin-bottom: 20px;
  }
  #win-screen .win-score {
    font-size: 24px;
    color: #FFD700;
    margin-bottom: 50px;
  }
  #win-screen .win-custom-bg {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: -1;
  }

  /* RESTART BUTTON */
  .restart-btn {
    cursor: pointer;
    border: none;
    background: transparent;
    padding: 0;
    transform-origin: center center;
    transition: transform 0.15s, filter 0.15s;
  }
  .restart-btn:hover {
    transform: scale(1.1);
    filter: brightness(1.3);
  }
  .restart-btn .btn-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 360px;
    height: 80px;
    background: linear-gradient(180deg, #4488FF, #2244AA);
    border: 3px solid #88BBFF;
    border-radius: 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    color: #FFF;
    animation: pulse-coin 2s ease-in-out infinite;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .restart-btn:hover .btn-placeholder {
    background: linear-gradient(180deg, #66AAFF, #3366CC);
    box-shadow: 0 0 25px rgba(68,136,255,0.6);
  }
  .restart-btn .btn-custom-img {
    display: none;
    width: 360px;
    height: auto;
    transition: filter 0.15s;
  }
  .restart-btn:hover .btn-custom-img {
    filter: brightness(1.25) drop-shadow(0 0 12px rgba(255,255,255,0.4));
  }

  /* HUD */
  #hud {
    position: absolute;
    top: 0; left: 0;
    width: 1920px;
    height: 60px;
    z-index: 5;
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    pointer-events: none;
  }
  #hud.active { display: flex; }

  #hud-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
  }
  #hud-bg-default {
    width: 100%; height: 100%;
    background: linear-gradient(180deg, rgba(0,0,0,0.85), rgba(0,0,0,0.3));
  }
  #hud-bg-custom {
    display: none;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .hud-left, .hud-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .hud-lives {
    display: flex;
    gap: 8px;
  }
  .hud-lives .life-icon { width: 28px; height: 28px; }
  .hud-lives .life-icon-placeholder {
    width: 28px; height: 28px;
    background: #FFD700;
    border-radius: 50%;
    clip-path: polygon(100% 50%, 50% 50%, 75% 15%, 100% 0%, 100% 100%, 75% 85%);
  }

  .hud-score {
    font-size: 20px;
    color: #FFF;
    text-shadow: 2px 2px 0 #000;
  }

  .hud-label {
    font-size: 12px;
    color: #aaa;
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="gameCanvas" width="1920" height="1080"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-bg">
      <div id="hud-bg-default"></div>
      <img id="hud-bg-custom" src="" alt="HUD Background">
    </div>
    <div class="hud-left">
      <span class="hud-label">LIVES</span>
      <div class="hud-lives" id="hud-lives"></div>
    </div>
    <div class="hud-right">
      <span class="hud-label">SCORE</span>
      <span class="hud-score" id="hud-score">0</span>
    </div>
  </div>

  <!-- MENU SCREEN -->
  <div id="menu-screen" class="overlay-screen">
    <img id="menu-bg-custom" src="" alt="" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-1;">
    <div class="menu-title">PAC-MAN</div>
    <div class="menu-subtitle">WORKSHOP EDITION</div>
    <button class="insert-coin-btn" id="btn-start" onclick="startGame()">
      <div class="btn-placeholder">INSERT COIN</div>
      <img class="btn-custom-img btn-img-normal" src="" alt="Start">
      <img class="btn-custom-img btn-img-hover" src="" alt="Start Hover" style="display:none;">
    </button>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="gameover-screen" class="overlay-screen hidden">
    <img class="go-custom-bg" src="" alt="">
    <div class="go-title">GAME OVER</div>
    <div class="go-score">SCORE: <span id="go-score-val">0</span></div>
    <button class="restart-btn" id="btn-gameover-restart" onclick="restartGame()">
      <div class="btn-placeholder">PLAY AGAIN</div>
      <img class="btn-custom-img btn-img-normal" src="" alt="Restart">
      <img class="btn-custom-img btn-img-hover" src="" alt="Restart Hover" style="display:none;">
    </button>
  </div>

  <!-- WIN SCREEN -->
  <div id="win-screen" class="overlay-screen hidden">
    <img class="win-custom-bg" src="" alt="">
    <div class="win-title">YOU WIN!</div>
    <div class="win-score">SCORE: <span id="win-score-val">0</span></div>
    <button class="restart-btn" id="btn-win-restart" onclick="restartGame()">
      <div class="btn-placeholder">PLAY AGAIN</div>
      <img class="btn-custom-img btn-img-normal" src="" alt="Restart">
      <img class="btn-custom-img btn-img-hover" src="" alt="Restart Hover" style="display:none;">
    </button>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════════════════╗
// ║                                                                  ║
// ║   SWAPPABLE ASSET CONFIGURATION                                  ║
// ║                                                                  ║
// ║   Students: Change the file paths below to swap in your          ║
// ║   custom PNG / GIF assets. Set to null to use placeholders.      ║
// ║                                                                  ║
// ╚══════════════════════════════════════════════════════════════════╝


const ASSETS = {
  // ── BACKGROUND (1920×1080 PNG) ─────────────────────────────────
  background: 'assets/screens/background.png',  // e.g. "assets/my_background.png"

  // ── MAZE WALL TILES (40×40 each, 3 variations) ────────────────
  mazeWall_1: 'assets/walls/wall1.png',  // primary wall tile
  mazeWall_2: 'assets/walls/wall2.png',  // accent tile
  mazeWall_3: 'assets/walls/wall3.png',  // detail tile

  // ── PLAYER (40×40, GIF or PNG) ─────────────────────────────────
  player: 'assets/player/player1.png',         // e.g. "assets/pacman.gif" or "assets/pacman_1.png"
  player_frame2: 'assets/player/player2.png',  // 2nd frame (only if player is PNG)

  // ── PLAYER FRENZY STATE (40×40) ────────────────────────────────
  playerFrenzy: 'assets/player/playerFrenzy1.png',
  playerFrenzy_frame2: 'assets/player/playerFrenzy2.png',

  // ── GHOSTS (40×40 each, GIF or PNG) ────────────────────────────
  ghost1: 'assets/enemies/enemy1.png',  ghost1_frame2: 'assets/enemies/enemy1Frame2.png',
  ghost2: 'assets/enemies/enemy2.png',  ghost2_frame2: 'assets/enemies/enemy2Frame2.png',
  ghost3: 'assets/enemies/enemy3.png',  ghost3_frame2: 'assets/enemies/enemy3Frame2.png',
  ghost4: 'assets/enemies/enemy4.png',  ghost4_frame2: 'assets/enemies/enemy4Frame2.png',

  // ── GHOST FRENZY / SCARED STATE (40×40) ────────────────────────
  ghostFrenzy: 'assets/enemies/enemyFrenzy.png',
  ghostFrenzy_frame2: 'assets/enemies/enemyFrenzy2.png',

  // ── PELLETS (16×16) ────────────────────────────────────────────
  pellet: 'assets/pellets/pellets.png',
  pellet_frame2: 'assets/pellets/pellets2.png',

  // ── POWER-UP (40×40 square) ────────────────────────────────────
  powerup: 'assets/pellets/powerUp.png',
  powerup_frame2: 'assets/pellets/powerUp2.png',

  // ── HUD (bar: 1920×60, life icon: 28×28) ──────────────────────
  hudBackground: 'assets/hud/hudBG.png',
  lifeIcon: 'assets/hud/lifeIcon.png',

  // ── SCREENS ────────────────────────────────────────────────────
  menuBackground: 'assets/screens/screenStart.png',
  menuStartButton: 'assets/buttons/btnStart1.png',
  menuStartButtonHover: 'assets/buttons/btnStart2.png',      // hover state for start button
  gameOverBackground: 'assets/screens/screenEnd.png',
  gameOverRestartButton: 'assets/buttons/btnEnd1.png',
  gameOverRestartButtonHover: 'assets/buttons/btnEnd2.png', // hover state for game over restart
  winBackground: 'assets/screens/screenWin.png',
  winRestartButton: 'assets/buttons/btnWin1.png',
  winRestartButtonHover: 'assets/buttons/btnWin2.png',      // hover state for win restart
};



// ╔══════════════════════════════════════════════════════════════════╗
// ║   GAME CONFIGURATION                                            ║
// ╚══════════════════════════════════════════════════════════════════╝

const TILE = 60;
const COLS = 32;   // 32 × 60 = 1920
const ROWS = 18;   // 18 × 60 = 1080
const HUD_ROWS = 1; // top 1 row reserved for HUD (60px)

const PLAYER_SPEED = 3;
const FRENZY_DURATION = 8000;
const ANIM_RATE = 12; // frames between animation toggle
const PELLET_SCORE = 10;
const POWERUP_SCORE = 50;
const GHOST_EAT_SCORE = 200;
const POWERUP_RESPAWN_TIME = 15000; // ms before a collected power-up respawns

// ── GHOST SPEED RAMP ─────────────────────────────────────────────
// Ghosts start at 0.5× player speed, hold for 20s, then ramp to 1.5×
const GHOST_SPEED_MIN    = PLAYER_SPEED * 0.5;  // starting speed
const GHOST_SPEED_MAX    = PLAYER_SPEED * 1.5;  // maximum speed
const GHOST_GRACE_PERIOD = 20;   // seconds before speed starts increasing
const GHOST_RAMP_DURATION = 120; // seconds over which speed ramps from min to max

let gameStartTime = 0; // set when game begins

function getGhostSpeed() {
  const elapsed = (performance.now() - gameStartTime) / 1000; // seconds
  if (elapsed < GHOST_GRACE_PERIOD) return GHOST_SPEED_MIN;
  const rampProgress = Math.min((elapsed - GHOST_GRACE_PERIOD) / GHOST_RAMP_DURATION, 1);
  return GHOST_SPEED_MIN + (GHOST_SPEED_MAX - GHOST_SPEED_MIN) * rampProgress;
}


// ╔══════════════════════════════════════════════════════════════════╗
// ║   RESPONSIVE SCALING — fits 1920×1080 into any browser window   ║
// ╚══════════════════════════════════════════════════════════════════╝

function resizeGame() {
  const wrapper = document.getElementById('game-wrapper');
  const scaleX = window.innerWidth / 1920;
  const scaleY = window.innerHeight / 1080;
  const scale = Math.min(scaleX, scaleY);
  wrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
}
window.addEventListener('resize', resizeGame);


// ╔══════════════════════════════════════════════════════════════════╗
// ║   MAZE LAYOUT                                                    ║
// ╚══════════════════════════════════════════════════════════════════╝

function createMaze() {
  const m = [];

  // Row 0: HUD (empty)
  for (let r = 0; r < HUD_ROWS; r++) m.push(new Array(COLS).fill(4));

  // 17-row × 32-col maze. 1=wall, 0=open path
  const layout = [
    //0         1         2         3
    //01234567890123456789012345678901
    "11111111111111111111111111111111", // 0
    "10000000000100000000010000000001", // 1  ← player start (1,1)
    "10111011101011101110101011101101", // 2
    "10000000000000000000000000000001", // 3
    "10110111011101011010111011101101", // 4
    "10000010000001000010000010000001", // 5
    "11101010111010111010111010101111", // 6
    "00000010001000000000100010000000", // 7  ← tunnels
    "11101010101011100111010101011111", // 8
    "10000010001000000000000000000001", // 9  ← ghost start row
    "10110111011101011010111011101101", // 10
    "10000000000000000000000000000001", // 11
    "10111011101011101110101011101101", // 12
    "10000000000100000000010000000001", // 13
    "10110111010101110111010101110101", // 14
    "10000000000000000000000000000001", // 15
    "11111111111111111111111111111111", // 16
  ];

  for (let r = 0; r < layout.length; r++) {
    const row = [];
    for (let c = 0; c < COLS; c++) row.push(parseInt(layout[r][c]));
    m.push(row);
  }

  // Place power-ups at 4 strategic corners
  const pups = [
    [HUD_ROWS + 1, 1],
    [HUD_ROWS + 1, COLS - 2],
    [HUD_ROWS + 15, 1],
    [HUD_ROWS + 15, COLS - 2],
  ];
  for (const [pr, pc] of pups) {
    if (m[pr] && m[pr][pc] !== 1) m[pr][pc] = 3;
  }

  // ── FILL ALL OPEN PATHS (0) WITH PELLETS (2) ──
  for (let r = 0; r < m.length; r++) {
    for (let c = 0; c < m[r].length; c++) {
      if (m[r][c] === 0) m[r][c] = 2;
    }
  }

  // Clear pellets from player start & ghost start area
  m[HUD_ROWS + 1][1] = 0; // player start
  // Ghost start zone (row 9, cols 14-17)
  for (let c = 13; c <= 18; c++) {
    if (m[HUD_ROWS + 9] && m[HUD_ROWS + 9][c] === 2) m[HUD_ROWS + 9][c] = 0;
  }

  return m;
}

function assignWallVariations(maze) {
  const v = [];
  for (let r = 0; r < maze.length; r++) {
    v[r] = [];
    for (let c = 0; c < maze[r].length; c++) {
      v[r][c] = ((r * 7 + c * 13 + r * c) % 3) + 1;
    }
  }
  return v;
}


// ╔══════════════════════════════════════════════════════════════════╗
// ║   IMAGE LOADER                                                   ║
// ╚══════════════════════════════════════════════════════════════════╝

const loadedImages = {};

function isGif(path) { return path && path.toLowerCase().endsWith('.gif'); }

function loadImage(key, path) {
  return new Promise(resolve => {
    if (!path) return resolve(null);
    const img = new Image();
    img.onload = () => { loadedImages[key] = img; resolve(img); };
    img.onerror = () => resolve(null);
    img.src = path;
  });
}

async function loadAllAssets() {
  await Promise.all(
    Object.entries(ASSETS).filter(([,p]) => p).map(([k,p]) => loadImage(k, p))
  );
}


// ╔══════════════════════════════════════════════════════════════════╗
// ║   GAME STATE                                                     ║
// ╚══════════════════════════════════════════════════════════════════╝

let canvas, ctx;
let maze, wallVariations;
let gameState = 'menu';
let score = 0;
let lives = 3;
let frenzyActive = false;
let frenzyTimer = null;
let animFrame = 0;
let animTick = 0;
let totalPellets = 0;
let pelletsEaten = 0;
let gameLoopId = null;
let devMode = false; // toggle with 'u' key — permanent frenzy
let powerupRespawnTimers = []; // queued respawns: { row, col, time }

// Fixed power-up spawn locations
const POWERUP_POSITIONS = [
  { row: HUD_ROWS + 1, col: 1 },
  { row: HUD_ROWS + 1, col: COLS - 2 },
  { row: HUD_ROWS + 15, col: 1 },
  { row: HUD_ROWS + 15, col: COLS - 2 },
];

const PLAYER_START = { col: 1, row: HUD_ROWS + 1 };

let player = {
  col: 1, row: HUD_ROWS + 1,
  x: 0, y: 0,
  dir: { dx: 0, dy: 0 },
  nextDir: { dx: 0, dy: 0 },
  frenzy: false,
};

let ghosts = [];
const GHOST_COLORS = ['#FF0000', '#FFB8FF', '#00FFFF', '#FFB852'];
const GHOST_STARTS = [
  { col: 14, row: HUD_ROWS + 9 },
  { col: 15, row: HUD_ROWS + 9 },
  { col: 16, row: HUD_ROWS + 9 },
  { col: 17, row: HUD_ROWS + 9 },
];


// ╔══════════════════════════════════════════════════════════════════╗
// ║   HELPERS                                                        ║
// ╚══════════════════════════════════════════════════════════════════╝

function isWall(c, r) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return true;
  return maze[r] && maze[r][c] === 1;
}

function tileCx(c) { return c * TILE + TILE / 2; }
function tileCy(r) { return r * TILE + TILE / 2; }

function wrapCol(c) {
  if (c < 0) return COLS - 1;
  if (c >= COLS) return 0;
  return c;
}


// ╔══════════════════════════════════════════════════════════════════╗
// ║   INITIALIZATION                                                 ║
// ╚══════════════════════════════════════════════════════════════════╝

window.onload = async function() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  resizeGame();
  await loadAllAssets();
  applyCustomScreenAssets();
  setupInput();
};

function applyCustomScreenAssets() {
  // ── Helper: set up a swappable button with optional hover state ──
  function setupButton(btn, normalKey, hoverKey) {
    if (!loadedImages[normalKey]) return;
    btn.querySelector('.btn-placeholder').style.display = 'none';
    const normalImg = btn.querySelector('.btn-img-normal');
    normalImg.src = ASSETS[normalKey];
    normalImg.style.display = 'block';

    if (loadedImages[hoverKey]) {
      const hoverImg = btn.querySelector('.btn-img-hover');
      hoverImg.src = ASSETS[hoverKey];
      // Swap images on hover
      btn.addEventListener('mouseenter', () => {
        normalImg.style.display = 'none';
        hoverImg.style.display = 'block';
      });
      btn.addEventListener('mouseleave', () => {
        normalImg.style.display = 'block';
        hoverImg.style.display = 'none';
      });
    }
  }

  // ── Menu Screen ──
  if (loadedImages.menuBackground) {
    const el = document.getElementById('menu-bg-custom');
    el.src = ASSETS.menuBackground; el.style.display = 'block';
    document.querySelector('#menu-screen .menu-title').style.display = 'none';
    document.querySelector('#menu-screen .menu-subtitle').style.display = 'none';
  }
  setupButton(document.getElementById('btn-start'), 'menuStartButton', 'menuStartButtonHover');

  // ── Game Over Screen ──
  if (loadedImages.gameOverBackground) {
    const el = document.querySelector('#gameover-screen .go-custom-bg');
    el.src = ASSETS.gameOverBackground; el.style.display = 'block';
    document.querySelector('#gameover-screen .go-title').style.display = 'none';
    document.querySelector('#gameover-screen .go-score').style.display = 'none';
  }
  setupButton(document.getElementById('btn-gameover-restart'), 'gameOverRestartButton', 'gameOverRestartButtonHover');

  // ── Win Screen ──
  if (loadedImages.winBackground) {
    const el = document.querySelector('#win-screen .win-custom-bg');
    el.src = ASSETS.winBackground; el.style.display = 'block';
    document.querySelector('#win-screen .win-title').style.display = 'none';
    document.querySelector('#win-screen .win-score').style.display = 'none';
  }
  setupButton(document.getElementById('btn-win-restart'), 'winRestartButton', 'winRestartButtonHover');

  // ── HUD ──
  if (loadedImages.hudBackground) {
    document.getElementById('hud-bg-default').style.display = 'none';
    const el = document.getElementById('hud-bg-custom');
    el.src = ASSETS.hudBackground; el.style.display = 'block';
  }
}

function initGame() {
  maze = createMaze();
  wallVariations = assignWallVariations(maze);
  score = 0; lives = 3;
  frenzyActive = false;
  pelletsEaten = 0; totalPellets = 0;
  animFrame = 0; animTick = 0;
  gameStartTime = performance.now();
  powerupRespawnTimers = [];

  for (let r = 0; r < maze.length; r++)
    for (let c = 0; c < maze[r].length; c++)
      if (maze[r][c] === 2) totalPellets++;

  resetPlayer();

  ghosts = GHOST_STARTS.map((pos, i) => ({
    col: pos.col, row: pos.row,
    x: tileCx(pos.col), y: tileCy(pos.row),
    prevCol: pos.col, prevRow: pos.row,
    color: GHOST_COLORS[i],
    index: i,
    scared: false,
    releaseDelay: i * 60, // stagger ghost release (frames)
  }));

  updateHUD();
}

function resetPlayer() {
  player.col = PLAYER_START.col;
  player.row = PLAYER_START.row;
  player.x = tileCx(player.col);
  player.y = tileCy(player.row);
  player.dir = { dx: 0, dy: 0 };
  player.nextDir = { dx: 0, dy: 0 };
  player.frenzy = false;
}


// ╔══════════════════════════════════════════════════════════════════╗
// ║   INPUT                                                          ║
// ╚══════════════════════════════════════════════════════════════════╝

function setupInput() {
  document.addEventListener('keydown', e => {
    if (gameState !== 'playing') return;
    switch(e.key) {
      case 'ArrowUp':    case 'w': case 'W': player.nextDir = { dx: 0, dy:-1 }; e.preventDefault(); break;
      case 'ArrowDown':  case 's': case 'S': player.nextDir = { dx: 0, dy: 1 }; e.preventDefault(); break;
      case 'ArrowLeft':  case 'a': case 'A': player.nextDir = { dx:-1, dy: 0 }; e.preventDefault(); break;
      case 'ArrowRight': case 'd': case 'D': player.nextDir = { dx: 1, dy: 0 }; e.preventDefault(); break;
      case 'u': case 'U':
        devMode = !devMode;
        if (devMode) {
          player.frenzy = true;
          frenzyActive = true;
          ghosts.forEach(g => g.scared = true);
          if (frenzyTimer) { clearTimeout(frenzyTimer); frenzyTimer = null; }
        } else {
          player.frenzy = false;
          frenzyActive = false;
          ghosts.forEach(g => g.scared = false);
        }
        break;
    }
  });
}


// ╔══════════════════════════════════════════════════════════════════╗
// ║   GAME FLOW                                                      ║
// ╚══════════════════════════════════════════════════════════════════╝

function startGame() {
  document.getElementById('menu-screen').classList.add('hidden');
  document.getElementById('hud').classList.add('active');
  initGame();
  gameState = 'playing';
  gameLoop();
}

function restartGame() {
  document.getElementById('gameover-screen').classList.add('hidden');
  document.getElementById('win-screen').classList.add('hidden');
  document.getElementById('menu-screen').classList.remove('hidden');
  document.getElementById('hud').classList.remove('active');
  if (gameLoopId) cancelAnimationFrame(gameLoopId);
  if (frenzyTimer) clearTimeout(frenzyTimer);
  gameState = 'menu';
  ctx.clearRect(0, 0, 1920, 1080);
}

function triggerGameOver() {
  gameState = 'gameover';
  document.getElementById('hud').classList.remove('active');
  document.getElementById('go-score-val').textContent = score;
  document.getElementById('gameover-screen').classList.remove('hidden');
  localStorage.setItem('pixelate_pending_score', JSON.stringify({ game: 'game17', score: score }));
}

function triggerWin() {
  gameState = 'win';
  document.getElementById('hud').classList.remove('active');
  document.getElementById('win-score-val').textContent = score;
  document.getElementById('win-screen').classList.remove('hidden');
  localStorage.setItem('pixelate_pending_score', JSON.stringify({ game: 'game17', score: score }));
}


// ╔══════════════════════════════════════════════════════════════════╗
// ║   HUD                                                            ║
// ╚══════════════════════════════════════════════════════════════════╝

function updateHUD() {
  document.getElementById('hud-score').textContent = score;
  const el = document.getElementById('hud-lives');
  el.innerHTML = '';
  for (let i = 0; i < lives; i++) {
    if (loadedImages.lifeIcon) {
      const img = document.createElement('img');
      img.className = 'life-icon'; img.src = ASSETS.lifeIcon;
      el.appendChild(img);
    } else {
      const div = document.createElement('div');
      div.className = 'life-icon-placeholder';
      el.appendChild(div);
    }
  }
}


// ╔══════════════════════════════════════════════════════════════════╗
// ║   PLAYER UPDATE — tile-based with smooth pixel interpolation     ║
// ╚══════════════════════════════════════════════════════════════════╝

function updatePlayer() {
  const targetX = tileCx(player.col);
  const targetY = tileCy(player.row);
  const distX = Math.abs(player.x - targetX);
  const distY = Math.abs(player.y - targetY);

  // At tile center → make decisions
  if (distX < PLAYER_SPEED && distY < PLAYER_SPEED) {
    player.x = targetX;
    player.y = targetY;

    // Collect pellet
    if (maze[player.row][player.col] === 2) {
      maze[player.row][player.col] = 0;
      score += PELLET_SCORE;
      pelletsEaten++;
      updateHUD();
      if (pelletsEaten >= totalPellets) { triggerWin(); return; }
    }
    // Collect power-up
    if (maze[player.row][player.col] === 3) {
      maze[player.row][player.col] = 0;
      score += POWERUP_SCORE;
      activateFrenzy();
      updateHUD();
      // Queue respawn at this location
      powerupRespawnTimers.push({
        row: player.row,
        col: player.col,
        time: performance.now() + POWERUP_RESPAWN_TIME,
      });
    }

    // Try buffered direction first
    const nd = player.nextDir;
    const nc1 = wrapCol(player.col + nd.dx);
    const nr1 = player.row + nd.dy;
    if ((nd.dx || nd.dy) && !isWall(nc1, nr1)) {
      player.dir = { ...nd };
    }

    // Advance to next tile if direction is valid
    const d = player.dir;
    const nc2 = wrapCol(player.col + d.dx);
    const nr2 = player.row + d.dy;
    if ((d.dx || d.dy) && !isWall(nc2, nr2)) {
      player.col = nc2;
      player.row = nr2;
    } else {
      player.dir = { dx: 0, dy: 0 };
    }
  }

  // Smooth movement toward target tile center
  const destX = tileCx(player.col);
  const destY = tileCy(player.row);
  let dx = destX - player.x;
  let dy = destY - player.y;

  // Teleport on wrap
  if (Math.abs(dx) > TILE * 2) { player.x = destX; dx = 0; }
  if (Math.abs(dy) > TILE * 2) { player.y = destY; dy = 0; }

  if (dx) player.x += Math.sign(dx) * Math.min(PLAYER_SPEED, Math.abs(dx));
  if (dy) player.y += Math.sign(dy) * Math.min(PLAYER_SPEED, Math.abs(dy));
}


// ╔══════════════════════════════════════════════════════════════════╗
// ║   FRENZY                                                         ║
// ╚══════════════════════════════════════════════════════════════════╝

function activateFrenzy() {
  frenzyActive = true;
  player.frenzy = true;
  ghosts.forEach(g => g.scared = true);
  if (frenzyTimer) clearTimeout(frenzyTimer);
  if (!devMode) {
    frenzyTimer = setTimeout(() => {
      frenzyActive = false;
      player.frenzy = false;
      ghosts.forEach(g => g.scared = false);
    }, FRENZY_DURATION);
  }
}


// ╔══════════════════════════════════════════════════════════════════╗
// ║   GHOST AI — BFS pathfinding, chase/flee, tile movement          ║
// ╚══════════════════════════════════════════════════════════════════╝

function bfsFirstStep(fromC, fromR, toC, toR) {
  if (fromC === toC && fromR === toR) return null;
  const visited = new Set([`${fromC},${fromR}`]);
  const queue = [{ c: fromC, r: fromR, first: null }];
  const dirs = [{dc:0,dr:-1},{dc:0,dr:1},{dc:-1,dr:0},{dc:1,dr:0}];

  while (queue.length) {
    const cur = queue.shift();
    for (const d of dirs) {
      const nc = wrapCol(cur.c + d.dc);
      const nr = cur.r + d.dr;
      const key = `${nc},${nr}`;
      if (visited.has(key) || nr < 0 || nr >= ROWS || isWall(nc, nr)) continue;
      visited.add(key);
      const step = cur.first || { c: nc, r: nr };
      if (nc === toC && nr === toR) return step;
      queue.push({ c: nc, r: nr, first: step });
    }
  }
  return null;
}

function getNeighbors(c, r) {
  const dirs = [{dc:0,dr:-1},{dc:0,dr:1},{dc:-1,dr:0},{dc:1,dr:0}];
  const out = [];
  for (const d of dirs) {
    const nc = wrapCol(c + d.dc);
    const nr = r + d.dr;
    if (nr >= 0 && nr < ROWS && !isWall(nc, nr)) out.push({ c: nc, r: nr });
  }
  return out;
}

function updateGhosts() {
  const ghostSpeed = getGhostSpeed();

  for (const g of ghosts) {
    // Stagger release
    if (g.releaseDelay > 0) { g.releaseDelay--; continue; }

    const tx = tileCx(g.col);
    const ty = tileCy(g.row);

    if (Math.abs(g.x - tx) < ghostSpeed && Math.abs(g.y - ty) < ghostSpeed) {
      g.x = tx; g.y = ty;

      // Choose next tile
      let next = null;

      if (g.scared) {
        // FLEE: pick neighbor farthest from player, avoid backtracking
        const neighbors = getNeighbors(g.col, g.row);
        let best = null, bestDist = -1;
        for (const n of neighbors) {
          // Don't go back the way we came (unless only option)
          if (n.c === g.prevCol && n.r === g.prevRow && neighbors.length > 1) continue;
          const d = Math.hypot(n.c - player.col, n.r - player.row);
          if (d > bestDist) { bestDist = d; best = n; }
        }
        if (!best && neighbors.length) best = neighbors[0];
        next = best;
      } else {
        // CHASE: BFS toward player (75% of time), scatter (25%)
        if (Math.random() < 0.75) {
          const step = bfsFirstStep(g.col, g.row, player.col, player.row);
          if (step) next = step;
        }
        // Scatter / fallback
        if (!next) {
          const corners = [
            {c:1,r:HUD_ROWS+1}, {c:COLS-2,r:HUD_ROWS+1},
            {c:1,r:ROWS-2}, {c:COLS-2,r:ROWS-2},
          ];
          const corner = corners[g.index % 4];
          const step = bfsFirstStep(g.col, g.row, corner.c, corner.r);
          if (step) next = step;
        }
        // Last resort: any neighbor
        if (!next) {
          const neighbors = getNeighbors(g.col, g.row);
          if (neighbors.length) next = neighbors[Math.floor(Math.random() * neighbors.length)];
        }
      }

      if (next) {
        g.prevCol = g.col;
        g.prevRow = g.row;
        g.col = next.c;
        g.row = next.r;
      }
    }

    // Smooth pixel movement
    const dx = tileCx(g.col) - g.x;
    const dy = tileCy(g.row) - g.y;
    if (Math.abs(dx) > TILE * 2) { g.x = tileCx(g.col); }
    else if (dx) g.x += Math.sign(dx) * Math.min(ghostSpeed, Math.abs(dx));
    if (Math.abs(dy) > TILE * 2) { g.y = tileCy(g.row); }
    else if (dy) g.y += Math.sign(dy) * Math.min(ghostSpeed, Math.abs(dy));

    // Collision with player
    if (Math.hypot(g.x - player.x, g.y - player.y) < TILE * 0.6) {
      if (g.scared) {
        score += GHOST_EAT_SCORE;
        const sp = GHOST_STARTS[g.index];
        g.col = sp.col; g.row = sp.row;
        g.x = tileCx(sp.col); g.y = tileCy(sp.row);
        g.prevCol = sp.col; g.prevRow = sp.row;
        g.scared = false;
        g.releaseDelay = 45;
        updateHUD();
      } else {
        lives--;
        updateHUD();
        if (lives <= 0) { triggerGameOver(); return; }
        resetPlayer();
        ghosts.forEach((gh, i) => {
          const sp = GHOST_STARTS[i];
          gh.col = sp.col; gh.row = sp.row;
          gh.x = tileCx(sp.col); gh.y = tileCy(sp.row);
          gh.prevCol = sp.col; gh.prevRow = sp.row;
          gh.releaseDelay = i * 60;
        });
        return;
      }
    }
  }
}


// ╔══════════════════════════════════════════════════════════════════╗
// ║   RENDERING                                                      ║
// ╚══════════════════════════════════════════════════════════════════╝

function render() {
  ctx.clearRect(0, 0, 1920, 1080);

  // Background
  if (loadedImages.background) {
    ctx.drawImage(loadedImages.background, 0, 0, 1920, 1080);
  } else {
    ctx.fillStyle = '#0a0a2e';
    ctx.fillRect(0, 0, 1920, 1080);
  }

  // Maze
  for (let r = HUD_ROWS; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * TILE, y = r * TILE;
      const cell = maze[r][c];

      if (cell === 1) {
        const v = wallVariations[r][c];
        if (loadedImages[`mazeWall_${v}`]) {
          ctx.drawImage(loadedImages[`mazeWall_${v}`], x, y, TILE, TILE);
        } else {
          ctx.fillStyle = ['#1a1aff','#2222cc','#1515aa'][v-1];
          ctx.fillRect(x, y, TILE, TILE);
          ctx.strokeStyle = '#4444ff'; ctx.lineWidth = 2;
          ctx.strokeRect(x+2, y+2, TILE-4, TILE-4);
        }
      } else if (cell === 2) {
        drawSprite('pellet','pellet_frame2', x+TILE/2, y+TILE/2, 16, 16, () => {
          ctx.fillStyle = '#FFFF88';
          ctx.beginPath(); ctx.arc(x+TILE/2, y+TILE/2, 4, 0, Math.PI*2); ctx.fill();
        });
      } else if (cell === 3) {
        drawSprite('powerup','powerup_frame2', x+TILE/2, y+TILE/2, TILE, TILE, () => {
          const pulse = 0.8 + 0.2*Math.sin(Date.now()/200);
          const sz = TILE*0.7*pulse;
          ctx.fillStyle = '#FF88FF'; ctx.shadowColor = '#FF00FF'; ctx.shadowBlur = 12;
          ctx.fillRect(x+(TILE-sz)/2, y+(TILE-sz)/2, sz, sz);
          ctx.shadowBlur = 0;
        });
      }
    }
  }

  // Player
  const pk = player.frenzy ? 'playerFrenzy' : 'player';
  const pk2 = player.frenzy ? 'playerFrenzy_frame2' : 'player_frame2';
  const d = player.dir;
  drawSprite(pk, pk2, player.x, player.y, TILE, TILE, () => {
    drawPlaceholderPacman(player.x, player.y, d.dx, d.dy, player.frenzy);
  });

  // Ghosts
  for (const g of ghosts) {
    const gk = g.scared ? 'ghostFrenzy' : `ghost${g.index+1}`;
    const gk2 = g.scared ? 'ghostFrenzy_frame2' : `ghost${g.index+1}_frame2`;
    drawSprite(gk, gk2, g.x, g.y, TILE, TILE, () => {
      drawPlaceholderGhost(g.x, g.y, g.color, g.scared);
    });
  }
}

function drawSprite(key1, key2, cx, cy, w, h, fallback) {
  const i1 = loadedImages[key1], i2 = loadedImages[key2];
  if (i1) {
    if (isGif(ASSETS[key1])) ctx.drawImage(i1, cx-w/2, cy-h/2, w, h);
    else if (i2) ctx.drawImage(animFrame?i2:i1, cx-w/2, cy-h/2, w, h);
    else ctx.drawImage(i1, cx-w/2, cy-h/2, w, h);
  } else fallback();
}


// ╔══════════════════════════════════════════════════════════════════╗
// ║   PLACEHOLDER DRAWINGS                                           ║
// ╚══════════════════════════════════════════════════════════════════╝

function drawPlaceholderPacman(cx, cy, dx, dy, frenzy) {
  const r = TILE/2-2;
  const mouth = animFrame ? 0.05 : 0.25;
  let rot = 0;
  if (dx===1) rot=0; else if (dx===-1) rot=Math.PI;
  else if (dy===-1) rot=-Math.PI/2; else if (dy===1) rot=Math.PI/2;

  ctx.save(); ctx.translate(cx, cy); ctx.rotate(rot);
  ctx.fillStyle = frenzy ? '#FF4444' : '#FFD700';
  ctx.shadowColor = frenzy ? '#FF0000' : '#FFD700'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.arc(0, 0, r, mouth*Math.PI, (2-mouth)*Math.PI);
  ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(4, -r*0.4, 3, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPlaceholderGhost(cx, cy, color, scared) {
  const r = TILE/2-2;
  const col = scared ? '#4444FF' : color;
  ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 6;

  ctx.beginPath(); ctx.arc(cx, cy-4, r, Math.PI, 0);
  ctx.lineTo(cx+r, cy+r-2);
  const w = animFrame ? -1 : 1;
  for (let i=0;i<4;i++) {
    ctx.lineTo(cx+r-(i+1)*(r*2/4), cy+r-2+w*4*((i%2===0)?1:-1));
  }
  ctx.lineTo(cx-r, cy+r-2); ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;

  if (scared) {
    ctx.fillStyle='#FFF'; ctx.beginPath();
    ctx.arc(cx-5,cy-6,4,0,Math.PI*2); ctx.arc(cx+5,cy-6,4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
    [-5,5].forEach(ox=>{
      ctx.beginPath();
      ctx.moveTo(cx+ox-2,cy-8); ctx.lineTo(cx+ox+2,cy-4);
      ctx.moveTo(cx+ox+2,cy-8); ctx.lineTo(cx+ox-2,cy-4);
      ctx.stroke();
    });
  } else {
    ctx.fillStyle='#FFF';
    ctx.beginPath(); ctx.ellipse(cx-6,cy-6,5,6,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+6,cy-6,5,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#00F'; ctx.beginPath();
    ctx.arc(cx-5,cy-5,2.5,0,Math.PI*2); ctx.arc(cx+7,cy-5,2.5,0,Math.PI*2); ctx.fill();
  }
}


// ╔══════════════════════════════════════════════════════════════════╗
// ║   GAME LOOP                                                      ║
// ╚══════════════════════════════════════════════════════════════════╝

function gameLoop() {
  if (gameState !== 'playing') return;
  gameLoopId = requestAnimationFrame(gameLoop);

  animTick++;
  if (animTick >= ANIM_RATE) { animFrame = 1-animFrame; animTick = 0; }

  updatePowerupRespawns();
  updatePlayer();
  if (gameState !== 'playing') return;
  updateGhosts();
  if (gameState !== 'playing') return;
  render();
}


// ╔══════════════════════════════════════════════════════════════════╗
// ║   POWER-UP RESPAWN                                               ║
// ╚══════════════════════════════════════════════════════════════════╝

function updatePowerupRespawns() {
  const now = performance.now();
  for (let i = powerupRespawnTimers.length - 1; i >= 0; i--) {
    const timer = powerupRespawnTimers[i];
    if (now >= timer.time) {
      // Only respawn if tile is empty (no player or ghost standing on it)
      const occupied =
        (player.col === timer.col && player.row === timer.row) ||
        ghosts.some(g => g.col === timer.col && g.row === timer.row);

      if (!occupied && maze[timer.row][timer.col] === 0) {
        maze[timer.row][timer.col] = 3;
        powerupRespawnTimers.splice(i, 1);
      }
      // If occupied, leave in queue — will retry next frame
    }
  }
}
